name: "Terraform Plan Check"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: self-hosted
    
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # CRÍTICO: No borra los archivos locales del Runner (como el .tfstate) 
          # entre ejecuciones, evitando conflictos de "Resource Already Exists".
          clean: false 

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false 

      # PASO ADICIONAL: Instalamos 'requests' en la carpeta de la Lambda 
      # para que Terraform lo incluya en el archivo .zip al desplegar.
      - name: Install Python Dependencies
        run: |
          pip install requests -t .

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -no-color